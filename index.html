<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HANA — 韓國女團交流平台</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== AUTH VIEW ===== -->
  <div id="view-auth" class="view active">
    <div class="auth-layout">
      <div class="auth-brand">
        <div class="brand-logo">花</div>
        <h1 class="brand-name">HANA</h1>
        <p class="brand-tagline">韓國女團分享交流平台</p>
      </div>

      <div class="auth-card" id="login-panel">
        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login">登入</button>
          <button class="tab-btn" data-tab="register">註冊</button>
        </div>

        <!-- Login Form -->
        <div class="tab-content active" id="tab-login">
          <div class="form-group">
            <label>帳號 ID</label>
            <input type="text" id="login-id" placeholder="輸入您的 ID" />
          </div>
          <div class="form-group">
            <label>密碼</label>
            <div class="pw-wrap">
              <input type="password" id="login-pw" placeholder="輸入密碼" />
              <button type="button" class="btn-eye" data-target="login-pw" aria-label="顯示或隱藏密碼">
                <svg class="eye-icon eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-error" id="login-error"></div>
          <button class="btn-primary" id="btn-login">登入</button>
          <p class="auth-footer-note">以訪客身份 <span class="link-text" id="btn-guest">瀏覽分享區</span></p>
        </div>

        <!-- Register Form -->
        <div class="tab-content" id="tab-register">
          <div class="avatar-upload-row">
            <div class="avatar-preview" id="reg-avatar-preview">
              <span>+</span>
            </div>
            <div>
              <p class="avatar-label">上傳頭貼</p>
              <label class="btn-upload" for="reg-avatar-input">選擇圖片</label>
              <input type="file" id="reg-avatar-input" accept="image/*" hidden />
            </div>
          </div>
          <div class="form-group">
            <label>帳號 ID</label>
            <input type="text" id="reg-id" placeholder="設定您的帳號 ID" />
          </div>
          <div class="form-group">
            <label>使用者名稱</label>
            <input type="text" id="reg-name" placeholder="顯示名稱" />
          </div>
          <div class="form-group">
            <label>密碼</label>
            <div class="pw-wrap">
              <input type="password" id="reg-pw" placeholder="設定密碼" />
              <button type="button" class="btn-eye" data-target="reg-pw" aria-label="顯示或隱藏密碼">
                <svg class="eye-icon eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="eye-icon eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-error" id="reg-error"></div>
          <button class="btn-primary" id="btn-register">建立帳號</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MAIN APP (shown after login) ===== -->
  <div id="view-app" class="view">

    <!-- Top Navigation Bar -->
    <nav class="topnav">
      <div class="nav-brand">
        <span class="brand-char">花</span>
        <span class="brand-text">HANA</span>
      </div>
      <div class="nav-links">
        <button class="nav-btn active" data-view="profile" id="nav-profile">個人主頁</button>
        <button class="nav-btn" data-view="feed" id="nav-feed">分享區</button>
      </div>
      <div class="nav-right">
        <div class="nav-user" id="nav-user-info"></div>
        <button class="nav-logout" id="btn-logout">登出</button>
      </div>
    </nav>

    <!-- ===== PROFILE VIEW ===== -->
    <div id="sub-profile" class="sub-view active">
      <div class="container">
        <div class="profile-header">
          <div style="width:100%; display:none; margin-bottom:1rem;" id="profile-back-wrap">
             <button class="btn-back" id="btn-back-to-feed">← 返回分享區</button>
          </div>
          <div class="profile-avatar-wrap" id="profile-avatar-wrap">
            <img id="profile-avatar" src="" alt="avatar" class="profile-avatar" />
          </div>
          <div class="profile-info">
            <h2 id="profile-name"></h2>
            <p id="profile-id-display" class="muted"></p>
          </div>
          <button class="btn-primary btn-new-post" id="btn-go-create">＋ 新增貼文</button>
        </div>

        <div class="section-title" id="profile-section-title">我的貼文</div>
        <div class="post-list" id="my-posts-list">
          <p class="empty-hint">尚未發佈任何貼文。</p>
        </div>
      </div>
    </div>

    <!-- ===== CREATE POST VIEW ===== -->
    <div id="sub-create" class="sub-view">
      <div class="container container-narrow">
        <div class="create-header">
          <div class="create-author-info" id="create-author-info"></div>
          <button class="btn-back" id="btn-back-from-create">← 返回</button>
        </div>
        <h2 class="create-title">發布新貼文</h2>

        <div class="form-group">
          <label>發布主題</label>
          <input type="text" id="post-subject" placeholder="這篇貼文的主題是..." />
        </div>
        <div class="form-group">
          <label>發布內容</label>
          <textarea id="post-content" rows="6" placeholder="分享你對韓國女團的想法、近況、推薦..."></textarea>
        </div>
        <div class="form-group">
          <label>附上圖片（選填）</label>
          <div class="img-upload-area" id="img-upload-area">
            <span>點擊或拖曳上傳圖片</span>
            <input type="file" id="post-img-input" accept="image/*" hidden />
          </div>
          <img id="post-img-preview" class="post-img-preview hidden" src="" alt="preview" />
        </div>

        <div class="form-error" id="post-error"></div>
        <button class="btn-primary btn-publish" id="btn-publish">發布貼文</button>
      </div>
    </div>

    <!-- ===== FEED VIEW ===== -->
    <div id="sub-feed" class="sub-view">
      <div class="container">
        <div class="feed-header">
          <h2 class="feed-title">分享區</h2>
          <p class="feed-subtitle muted">所有人的 K-Pop 交流牆</p>
        </div>
        <div class="post-list" id="feed-post-list">
          <p class="empty-hint">目前還沒有任何貼文，成為第一個發文的人吧！</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ===== GUEST NAV BAR (feed only) ===== -->
  <div id="view-guest" class="view">
    <nav class="topnav">
      <div class="nav-brand">
        <span class="brand-char">花</span>
        <span class="brand-text">HANA</span>
      </div>
      <div class="nav-links">
        <span class="nav-label">訪客瀏覽</span>
      </div>
      <div class="nav-right">
        <button class="btn-outline" id="btn-guest-login">登入 / 註冊</button>
      </div>
    </nav>
    <div id="sub-guest-feed" class="sub-view active">
      <div class="container">
        <div class="feed-header">
          <h2 class="feed-title">分享區</h2>
          <p class="feed-subtitle muted">訪客模式 — 登入後可留言互動</p>
        </div>
        <div class="post-list" id="guest-feed-post-list"></div>
      </div>
    </div>

    <!-- ===== GUEST PROFILE VIEW ===== -->
    <div id="sub-guest-profile" class="sub-view">
      <div class="container">
        <div class="profile-header">
          <div style="width:100%; margin-bottom:1rem;">
             <button class="btn-back" id="btn-guest-back-to-feed">← 返回分享區</button>
          </div>
          <div class="profile-avatar-wrap" id="guest-profile-avatar-wrap">
          </div>
          <div class="profile-info">
            <h2 id="guest-profile-name"></h2>
            <p id="guest-profile-id-display" class="muted"></p>
          </div>
        </div>

        <div class="section-title" id="guest-profile-section-title">他的貼文</div>
        <div class="post-list" id="guest-user-posts-list">
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Guest prompt ===== -->
  <div id="modal-guest" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon">花</div>
      <h3>您目前為訪客</h3>
      <p>是否擁有 HANA 平台帳號？<br/>登入後即可留言與互動！</p>
      <div class="modal-actions">
        <button class="btn-primary" id="modal-go-login">登入</button>
        <button class="btn-outline" id="modal-go-register">註冊帳號</button>
        <button class="btn-ghost" id="modal-cancel">繼續瀏覽</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: 2FA Captcha ===== -->
  <div id="modal-2fa" class="modal-overlay hidden">
    <div class="modal-box" style="max-width: 320px;">
      <h3>雙重驗證</h3>
      <p style="margin-bottom: 1rem; font-weight: 500; color: var(--c-text);">問題：請選取 ian 的娃娃</p>
      <div class="captcha-grid" id="captcha-grid">
      </div>
      <div class="form-error" id="captcha-error" style="text-align: center; margin-top: 0.5rem; height:1.5rem;"></div>
      <div class="modal-actions" style="margin-top: 1rem;">
        <button class="btn-ghost" id="modal-2fa-cancel">取消登入</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
